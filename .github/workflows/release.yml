name: Release

on:
  workflow_run:
    workflows: [Integration Tests]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_major:
        description: 'Bump major version (resets minor to 0)'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Determine version
        id: version
        run: |
          MAJOR=$(cat VERSION)

          # Bump major if requested via workflow dispatch
          if [ "${{ github.event.inputs.bump_major }}" = "true" ]; then
            MAJOR=$((MAJOR + 1))
            echo "$MAJOR" > VERSION
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add VERSION
            git commit -m "Bump major version to $MAJOR"
            git push
            MINOR=0
          else
            # Count merges to main since last major bump (minor version)
            LAST_MAJOR_COMMIT=$(git log --all --oneline --diff-filter=M -- VERSION | head -1 | awk '{print $1}')
            if [ -z "$LAST_MAJOR_COMMIT" ]; then
              MINOR=$(git rev-list --count HEAD)
            else
              MINOR=$(git rev-list --count ${LAST_MAJOR_COMMIT}..HEAD)
            fi
          fi

          VERSION="${MAJOR}.${MINOR}.0"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release binaries
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for rid in linux-x64 linux-arm64 osx-x64 osx-arm64 win-x64; do
            dotnet publish src/OrasBackup.Cli -c Release -r $rid --self-contained \
              -p:PublishSingleFile=true -p:Version=$VERSION \
              -o dist/$rid
          done

      - name: Package binaries
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          cd dist
          for rid in linux-x64 linux-arm64 osx-x64 osx-arm64 win-x64; do
            if [ "$rid" = "win-x64" ]; then
              zip -j orasbackup-${rid}.zip $rid/orasbackup.exe
            else
              tar czf orasbackup-${rid}.tar.gz -C $rid orasbackup
            fi
          done

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: OrasBackup ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/orasbackup-linux-x64.tar.gz
            dist/orasbackup-linux-arm64.tar.gz
            dist/orasbackup-osx-x64.tar.gz
            dist/orasbackup-osx-arm64.tar.gz
            dist/orasbackup-win-x64.zip

      - name: Build GUI release binaries
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for rid in linux-x64 linux-arm64 osx-x64 osx-arm64 win-x64; do
            dotnet publish src/OrasBackup.Gui -c Release -r $rid --self-contained \
              -p:PublishSingleFile=true -p:Version=$VERSION \
              -o dist/$rid
          done

      - name: Package GUI binaries
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          cd dist
          for rid in linux-x64 linux-arm64 osx-x64 osx-arm64 win-x64; do
            if [ "$rid" = "win-x64" ]; then
              zip -j orasbackupgui-${rid}.zip $rid/orasbackup.exe
            else
              tar czf orasbackupgui-${rid}.tar.gz -C $rid orasbackup
            fi
          done

      - name: Create GitHub Release for GUI
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: OrasBackup GUI ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/orasbackupgui-linux-x64.tar.gz
            dist/orasbackupgui-linux-arm64.tar.gz
            dist/orasbackupgui-osx-x64.tar.gz
            dist/orasbackupgui-osx-arm64.tar.gz
            dist/orasbackupgui-win-x64.zip

      - name: Login to GHCR
        if: steps.check_tag.outputs.exists == 'false'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        if: steps.check_tag.outputs.exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.tag }}
