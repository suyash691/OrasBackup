name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit Tests (Core)
        run: >
          dotnet test tests/OrasBackup.Core.Tests --no-build --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory coverage/core
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: Unit Tests (GUI)
        run: >
          dotnet test tests/OrasBackup.Gui.Tests --no-build --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory coverage/gui
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          directory: coverage
          flags: unittests
          fail_ci_if_error: false
