name: Integration Tests

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
        env:
          REGISTRY_STORAGE_DELETE_ENABLED: "true"

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Wait for registry
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/v2/ && break
            sleep 1
          done

      - name: Integration Tests
        env:
          ORAS_REGISTRY: localhost:5000
        run: >
          dotnet test tests/OrasBackup.Integration.Tests --no-build --configuration Release
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --results-directory coverage/integration
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          directory: coverage
          flags: integration
          fail_ci_if_error: false

      - name: Registry stats
        if: always()
        run: |
          echo "=== Registry catalog after tests ==="
          curl -s http://localhost:5000/v2/_catalog | head -20
