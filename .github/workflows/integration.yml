name: Integration Tests

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
        env:
          REGISTRY_STORAGE_DELETE_ENABLED: "true"

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install oras CLI
        run: |
          curl -sLO https://github.com/oras-project/oras/releases/download/v1.2.2/oras_1.2.2_linux_amd64.tar.gz
          tar -xzf oras_1.2.2_linux_amd64.tar.gz
          sudo mv oras /usr/local/bin/
          oras version

      - name: Wait for registry
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/v2/ && break
            sleep 1
          done

      - name: Build
        run: dotnet build --configuration Release

      - name: Integration Tests
        env:
          ORAS_REGISTRY: localhost:5000
        run: dotnet test tests/OrasBackup.Integration.Tests --no-build --configuration Release --verbosity normal

      - name: Registry stats
        if: always()
        run: |
          echo "=== Registry catalog after tests ==="
          curl -s http://localhost:5000/v2/_catalog | head -20
